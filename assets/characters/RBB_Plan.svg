<?xml version="1.0" encoding="UTF-8"?>
<!-- RBB Plan View — Character Designer template guide (outline only) -->
<!-- ViewBox: -110,-110 to 110,110. Centre (0,0) = pen hole. Front = top (Y-) -->
<svg width="220mm" height="220mm" viewBox="-110 -110 220 220" version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     style="stroke-linecap:round;stroke-linejoin:round;">

  <g>
    <!-- Body ellipse outline — portrait -->
    <ellipse cx="0" cy="0" rx="81" ry="100"
             style="fill:none;stroke:#00E5FF;stroke-width:2;"/>

    <!-- Spigot ring outline -->
    <circle cx="0" cy="0" r="60"
            style="fill:none;stroke:#00E5FF;stroke-width:1;stroke-dasharray:4,3;"/>

    <!-- Keypad bezel outline — square -->
    <rect x="-31" y="-31" width="62" height="62"
          style="fill:none;stroke:#00E5FF;stroke-width:1.5;"/>

    <!-- Pen hole marker -->
    <circle cx="0" cy="0" r="5"
            style="fill:none;stroke:#00E5FF;stroke-width:1.5;"/>

    <!-- Forward direction indicator — small arrow pointing up -->
    <line x1="0" y1="-70" x2="0" y2="-85"
          style="stroke:#00E5FF;stroke-width:1.5;"/>
    <polygon points="0,-90 -4,-80 4,-80"
             style="fill:#00E5FF;stroke:none;"/>

  </g>
</svg>
