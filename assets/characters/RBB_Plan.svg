<?xml version="1.0" encoding="UTF-8"?>
<!-- RBB Plan View — default R3 Roamer character template -->
<!-- ViewBox: -110,-110 to 110,110. Centre (0,0) = pen hole. Front = top (Y-) -->
<svg width="220mm" height="220mm" viewBox="-110 -110 220 220" version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     style="stroke-linecap:round;stroke-linejoin:round;">

  <!-- Body ellipse — cream, portrait -->
  <ellipse cx="0" cy="0" rx="81" ry="100"
           style="fill:#E8DEB8;stroke:#B8A878;stroke-width:2;"/>

  <!-- Spigot ring — slightly darker cream -->
  <circle cx="0" cy="0" r="60"
          style="fill:#D8CEA8;stroke:#B8A878;stroke-width:1;"/>

  <!-- Keypad bezel — thick green border (outer rect) -->
  <rect x="-47" y="-40" width="94" height="80"
        style="fill:#3C8B6E;stroke:none;"/>

  <!-- Keypad graphic area — white fill inside bezel -->
  <rect x="-38" y="-33" width="76" height="65"
        style="fill:#ffffff;stroke:none;"/>

  <!-- Left eye — oval, black border, amber fill, dark pupil, white highlight -->
  <!-- Outer black border (oval) -->
  <ellipse cx="-31" cy="-81" rx="11" ry="8"
           style="fill:#1a1a1a;stroke:none;"/>
  <!-- Amber/golden eye fill -->
  <ellipse cx="-31" cy="-81" rx="9" ry="6.5"
           style="fill:#E8B84B;stroke:none;"/>
  <!-- Dark pupil -->
  <circle cx="-31" cy="-81" r="4"
          style="fill:#1a1a1a;stroke:none;"/>
  <!-- White specular highlight -->
  <circle cx="-27" cy="-84" r="1.8"
          style="fill:#ffffff;stroke:none;"/>

  <!-- Right eye — oval, black border, amber fill, dark pupil, white highlight -->
  <ellipse cx="31" cy="-81" rx="11" ry="8"
           style="fill:#1a1a1a;stroke:none;"/>
  <ellipse cx="31" cy="-81" rx="9" ry="6.5"
           style="fill:#E8B84B;stroke:none;"/>
  <circle cx="31" cy="-81" r="4"
          style="fill:#1a1a1a;stroke:none;"/>
  <circle cx="35" cy="-84" r="1.8"
          style="fill:#ffffff;stroke:none;"/>

</svg>
