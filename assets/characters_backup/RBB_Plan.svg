<?xml version="1.0" encoding="UTF-8"?>
<!-- RBB Plan View — coloured template for Character Designer -->
<svg width="220mm" height="220mm" viewBox="-110 -110 220 220" version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     style="stroke-linecap:round;stroke-linejoin:round;">

  <!-- coordinate system: 0,0 = pen hole centre; Y+ = front (up on screen) -->
  <!-- scale(1,-1) flips QCAD Y-up to SVG Y-down -->
  <g transform="scale(1,-1)">

    <!-- Body ellipse — cream fill -->
    <ellipse cx="0" cy="0" rx="100" ry="81"
             style="fill:#E8DEB8;stroke:#B8A878;stroke-width:1.0;"/>

    <!-- Spigot area circle r=60 — slightly darker cream -->
    <circle cx="0" cy="0" r="60"
            style="fill:#D8CEA8;stroke:#B8A878;stroke-width:0.75;"/>

    <!-- Keypad rounded rect 74x74 centred — blue-grey fill, green outline -->
    <rect x="-37" y="-37" width="74" height="74" rx="3" ry="3"
          style="fill:#8899BB;stroke:#3C8B6E;stroke-width:1.5;"/>

    <!-- Pen hole circle r=10 — green outline, cream fill -->
    <circle cx="0" cy="0" r="10"
            style="fill:#E8DEB8;stroke:#3C8B6E;stroke-width:1.5;"/>

    <!-- Forward direction indicator — small green triangle pointing up (front) -->
    <polygon points="0,25 -5,15 5,15"
             style="fill:#3C8B6E;stroke:none;"/>

  </g>
</svg>